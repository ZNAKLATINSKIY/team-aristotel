<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/app.css">
  <title>doc</title>
</head>
<body>
  <script>
    let radius = prompt("Каков-же ваш радиус окржности? В см");
    let result = Math.PI * Math.pow(radius, 2);
    alert("Площадь вашего радиуса окружности равен - " + result.toFixed(3) + "см");
  </script>
</body>
</html>
