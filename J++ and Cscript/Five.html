<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/app.css">
  <title>doc</title>
</head>
<body>
  <script>
    let kilometers = prompt("Сколько километров между городами?");
    let time = prompt("За сколько часов хотите туда доехать?");
    let speed = Math.floor(kilometers / time);
    alert("Вам нужно набрать " + speed + "км/ч, чтоб туда добраться");
  </script>
</body>
</html>
